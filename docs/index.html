<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSlides Demos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
    }

    .demos {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .demo-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .demo-card:hover {
      border-color: #58a6ff;
    }

    .demo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #30363d;
    }

    .demo-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .demo-title .icon {
      font-size: 1.3rem;
    }

    .demo-title h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .demo-title p {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 0.1rem;
    }

    .demo-actions {
      display: flex;
      gap: 0.5rem;
    }

    .demo-actions a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      color: #c9d1d9;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .demo-actions a:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #fff;
    }

    .demo-embed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .demo-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #484f58;
      font-size: 0.85rem;
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>OpenSlides Demos</h1>
      <p>Presentations generated with OpenSlides</p>
    </header>

    <div class="demos">
      <!--
        To add a new demo:
        1. Place the .html file in this docs/ folder
        2. Copy a demo-card block below
        3. Update the icon, title, description, iframe src, and "Open" href
      -->

      <div class="demo-card">
        <div class="demo-header">
          <div class="demo-title">
            <span class="icon">🤖</span>
            <div>
              <h2>PIRA-Bench</h2>
              <p>Proactive GUI Agents — research presentation</p>
            </div>
          </div>
          <div class="demo-actions">
            <a href="pira-bench.html" target="_blank" rel="noopener">Open ↗</a>
          </div>
        </div>
        <div class="demo-embed">
          <iframe src="pira-bench.html" loading="lazy" sandbox="allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>
      </div>

    </div>

    <footer>
      Powered by <a href="https://github.com/yuxiang-zh/OpenSlides" target="_blank" rel="noopener">OpenSlides</a>
    </footer>
  </div>
</body>
</html>
